name: ci

on:
    push:
        branches:
            - "**"
    pull_request:

jobs:
    verify:
        runs-on: ubuntu-latest

        steps:
            - name: checkout
              uses: actions/checkout@v4

            - name: setup bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: install dependencies
              run: bun install --frozen-lockfile

            - name: install example dependencies
              run: bun install
              working-directory: example

            - name: run ci
              run: bun run ci
